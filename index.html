<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexis Search</title>
    <!-- Keep the cropper css -->
    <link rel="stylesheet" href="lib/cropper.min.css">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
</head>

<body>

    <!-- Main Fullscreen Background -->
    <div class="main-bg-wrapper">
        <img src="img/v2_bg.png" alt="Background" class="main-bg" id="hero-img">
    </div>

    <!-- The actual App Container (The large glass pane) -->
    <div class="app-glass-container">

        <!-- Top Navigation -->
        <header class="top-nav">
            <div class="logo">Nexis</div>

            <!-- Video Downloader Widget (Top Left) -->
            <!-- Quick Notes Widget (Top Left) -->
            <div class="nav-left">
                <div class="quick-note-widget" id="quick-note-widget">
                    <div class="note-input-container">
                        <input type="text" id="qn-input" class="qn-input" placeholder="Jot a quick note..."
                            autocomplete="off" spellcheck="false">
                        <button id="qn-add-btn" class="qn-btn" title="Save Note">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                                <path d="M12 5v14m-7-7h14" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round" />
                            </svg>
                        </button>
                    </div>
                    <!-- Dropdown list of saved notes -->
                    <div class="notes-dropdown" id="notes-dropdown">
                        <div class="notes-list" id="notes-list">
                            <!-- Dynamic notes injected here -->
                        </div>
                    </div>
                </div>
            </div>

            <div class="nav-right">
                <!-- App Grid Icon -->
                <div class="apps-menu-container">
                    <button class="icon-btn apps-btn" id="apps-toggle" title="Google Apps">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <path
                                d="M4 4h4v4H4zM10 4h4v4h-4zM16 4h4v4h-4zM4 10h4v4H4zM10 10h4v4h-4zM16 10h4v4h-4zM4 16h4v4H4zM10 16h4v4h-4zM16 16h4v4h-4z"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                        </svg>
                    </button>
                    <!-- App Popup Menu -->
                    <div class="apps-dropdown" id="apps-dropdown">
                        <div class="app-grid" id="app-grid">
                            <!-- Dynamic Apps injected here -->
                        </div>
                        <button class="add-btn" id="add-app-btn" title="Add New App">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                                <path d="M12 5v14m-7-7h14" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round" />
                            </svg>
                            Add App
                        </button>
                    </div>
                </div>

                <div class="user-profile">
                    <!-- Notification Bell -->
                    <button class="icon-btn bell">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 0 1-3.46 0"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                        </svg>
                    </button>

                    <div class="profile-name-container">
                        <span class="greeting-prefix">Hi,</span>
                        <input type="text" id="profile-name-input" class="profile-name" value="Iza" spellcheck="false"
                            title="Click to edit name">
                    </div>

                    <div class="avatar-wrapper">
                        <img src="img/v2_bg.png" alt="Profile" class="avatar" id="profile-img">
                    </div>
                </div>
            </div>
        </header>

        <main class="center-content">
            <!-- Central Character -->
            <div class="character-container">
                <img src="img/main.png" alt="Anime Character" class="main-character-img" id="main-character-img">
            </div>

            <form id="search-form" class="search-form-centered" action="https://www.google.com/search" method="GET">

                <div class="search-input-wrapper">
                    <svg class="search-icon-large" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" stroke-width="2.5" stroke-linecap="round"
                            stroke-linejoin="round" />
                    </svg>
                    <input type="text" name="q" id="search-input" placeholder="Search the web..." autocomplete="off"
                        autofocus>
                </div>

                <div class="engine-and-settings"
                    style="display: flex; gap: 10px; align-items: center; justify-content: center; position: relative;">
                    <div class="engine-selector-wrapper">
                        <label for="engine-select" class="sr-only">Search Engine:</label>
                        <select id="engine-select" class="engine-select-styled" title="Choose Search Engine">
                            <option value="google">Google</option>
                            <option value="bing">Bing</option>
                            <option value="duckduckgo">DuckGo</option>
                            <option value="yahoo">Yahoo</option>
                        </select>
                    </div>

                    <!-- Settings Menu -->
                    <div class="main-settings-container">
                        <button type="button" class="icon-btn settings-btn" id="main-settings-btn"
                            title="Dashboard Settings">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                                <circle cx="12" cy="12" r="3" stroke-width="2" />
                                <path
                                    d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"
                                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                            </svg>
                        </button>
                    </div>
                </div>

            </form>

            <!-- Quick Links / Fav Apps -->
            <div class="quick-links-wrapper">
                <div class="quick-links" id="quick-links">
                    <!-- Dynamic Links injected here -->
                </div>
                <!-- Small Add button beside the quick links -->
                <button class="icon-btn add-link-icon" id="add-link-btn" title="Add Favorite Link">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <path d="M12 5v14m-7-7h14" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                </button>
            </div>
        </main>

        <!-- Bottom Right Clock & Weather Widget -->
        <div class="bottom-right-widget">
            <div class="weather-widget" id="weather-widget" title="Current Weather">
                <span class="weather-icon" id="weather-icon">☁️</span>
                <span class="weather-temp" id="weather-temp">--°C</span>
                <span class="weather-desc" id="weather-desc">Loading...</span>
            </div>
            <div class="clock-display" id="clock">00:00</div>
            <div class="greeting-message" id="greeting-msg">Have a great day!</div>
        </div>

    </div>

    <!-- Hidden file input for image upload -->
    <input type="file" id="image-upload" accept="image/*" style="display: none;">

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal">
        <div class="modal-content settings-modal-content">
            <div class="modal-header">
                <h3>Dashboard Settings</h3>
                <button id="close-settings-modal" class="close-btn" title="Close Settings">&times;</button>
            </div>
            <div class="settings-options-grid" id="main-settings-menu">
                <button type="button" class="settings-option-card" id="change-bg-btn">
                    <span class="icon">🖼️</span>
                    Change Background
                </button>
                <button type="button" class="settings-option-card" id="change-char-btn">
                    <span class="icon">🦸‍♀️</span>
                    Change Character
                </button>
                <button type="button" class="settings-option-card" id="change-avatar-btn">
                    <span class="icon">👤</span>
                    Change Avatar
                </button>
            </div>
        </div>
    </div>

    <!-- Cropper Modal -->
    <div id="cropper-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Crop & Resize Image</h3>
                <button id="close-modal" class="close-btn">&times;</button>
            </div>
            <div class="img-container">
                <img id="image-to-crop" src="">
            </div>
            <div class="modal-actions">
                <button id="cancel-crop" class="btn btn-secondary">Cancel</button>
                <button id="save-crop" class="btn btn-primary">Save Image</button>
            </div>
        </div>
    </div>

    <!-- AI Chatbot Button & Panel -->
    <button class="ai-toggle-btn" id="ai-toggle-btn" title="Chat with AI">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path d="M12 2l3 7 7 3-7 3-3 7-3-7-7-3 7-3z" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round" />
        </svg>
    </button>

    <div class="ai-chat-panel" id="ai-chat-panel">
        <div class="chat-header">
            <div class="chat-title">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" width="18" height="18">
                    <path d="M12 2l3 7 7 3-7 3-3 7-3-7-7-3 7-3z" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" />
                </svg>
                Gemini AI
            </div>
            <div class="chat-actions" style="display: flex; gap: 5px;">
                <button class="icon-btn" id="api-settings-btn" title="API Settings">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" width="16" height="16">
                        <circle cx="12" cy="12" r="3" stroke-width="2" />
                        <path
                            d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                </button>
                <button class="icon-btn close-chat" id="close-chat-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <path d="M18 6L6 18M6 6l12 12" stroke-width="2" stroke-linecap="round"
                            stroke-linejoin="round" />
                    </svg>
                </button>
            </div>
        </div>
        <div class="chat-messages" id="chat-messages">
            <div class="chat-bubble ai-msg">Hello! I'm Gemini. How can I help you today?</div>
        </div>
        <div class="chat-input-area">
            <input type="text" id="chat-input" placeholder="Ask local AI..." autocomplete="off">
            <button id="chat-send-btn" title="Send">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" />
                </svg>
            </button>
        </div>
    </div>

    <script src="lib/cropper.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
